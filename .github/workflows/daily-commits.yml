name: Daily Commits (fallback)

# 1차 실행은 맥의 launchd가 매일 오전 8시(KST)에 직접 커밋함.
# 이 워크플로는 "맥이 꺼져 있어 그날 커밋이 없었던 경우"만 보충하는 백업.
on:
  schedule:
    # 13:00 UTC = 22:00 KST. 그날 launchd가 이미 했으면 가드에서 건너뜀.
    - cron: '0 13 * * *'
  workflow_dispatch:   # 수동 실행도 허용

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create 10 commits (skip if already done today)
        run: |
          git config user.name "ch0ijimin323"
          git config user.email "266672550+ch0ijimin323@users.noreply.github.com"

          LAST=$(git log -1 --format=%ct --grep='daily activity' || echo "")
          NOW=$(date +%s)
          if [ -n "$LAST" ] && [ $((NOW - LAST)) -lt 64800 ]; then
            echo "최근 18시간 내 daily 커밋 존재 → 건너뜀(launchd가 이미 처리)"
            exit 0
          fi

          mkdir -p .daily
          LOG=".daily/activity.txt"
          for i in $(seq 1 10); do
            echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') commit #$i" >> "$LOG"
            git add "$LOG"
            git commit -m "chore: daily activity $(date '+%Y-%m-%d') #$i"
          done
          git push
